---
include:
  - https://salsa.debian.org/salsa-ci-team/pipeline/raw/master/recipes/debian.yml

variables:
  SALSA_CI_DISABLE_BLHC: 1
  SALSA_CI_DISABLE_REPROTEST: 1
  # Build for experimental distribution
  # RELEASE: 'experimental'
  # Use project-relative paths for better caching in custom jobs
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip
  # Enable parallel builds - uses all available CPU cores
  SALSA_CI_DPKG_BUILDPACKAGE_ARGS: "-j$(nproc)"

stages:
  - lint
  - provisioning
  - build
  - test
  - publish

# Build takes about 60-70 minute without caching on Salsa CI runners
build:
  extends: .build-package
  timeout: 2h

cargo-fmt:
  stage: lint
  image: rust:latest
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry
      - .cargo/git
      - target/

ruff:
  stage: lint
  image: python:latest
  script:
    - pip install ruff
    - ruff check .
    - ruff format --check .
  cache:
    key: ruff-${CI_JOB_IMAGE}
    paths:
      - .cache/pip
